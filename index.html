const STORAGE_KEY = "aiml-roadmap-progress-v1";

function loadSaved() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

export default function Roadmap() {
  const [activeMonth, setActiveMonth] = useState(1);
  const [openWeek, setOpenWeek] = useState(null);
  const [checked, setChecked] = useState(loadSaved);
  const [tab, setTab] = useState("plan"); // plan | tips | jobs

  // Sauvegarde automatique de la progression dans le navigateur
  useEffect(() => {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
    } catch (e) {
      // stockage indisponible (mode privé, etc.) — on ignore silencieusement
    }
  }, [checked]);

  const month = MONTHS.find(m => m.id === activeMonth);

  const toggle = (id) => setChecked(p => ({ ...p, [id]: !p[id] }));
  const toggleWeek = (id) => setOpenWeek(p => p === id ? null : id);

  // Count completed items per month
  const monthDayCount = month.weeks.reduce((acc, w) => acc + w.days.length, 0);
  const monthChecked = month.weeks.reduce((acc, w) =>
    acc + w.days.filter((_, di) => checked[`${w.id}-${di}`]).length, 0);
  const pct = Math.round((monthChecked / monthDayCount) * 100);

  return (
    <div style={{ fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif", maxWidth: 860, margin: "0 auto", padding: 16, background: "#f1f5f9", minHeight: "100vh" }}>

      {/* HERO */}

        background: "linear-gradient(135deg, #0f172a 0%, #1e1b4b 45%, #312e81 100%)",
        borderRadius: 20, padding: "28px 22px 22px", color: "white", marginBottom: 16,
        boxShadow: "0 8px 32px rgba(15,23,42,0.35)"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
          <span style={{ fontSize: 32 }}>🛸</span>
          <div>
            <div style={{ fontSize: 22, fontWeight: 900, letterSpacing: "-0.5px" }}>Roadmap AI/ML Engineer</div>
            <div style={{ fontSize: 13, opacity: 0.7, marginTop: 2 }}>3 mois · Junior Job-Ready · Remote-Proof</div>

        </div>

        <div style={{ display: "flex", gap: 8, marginTop: 18, marginBottom: 4 }}>

                borderRadius: 14, padding: "10px 6px", color: "white",
                transition: "all 0.15s",
              }}

              <div style={{ fontSize: 11, fontWeight: 800, marginTop: 4, opacity: activeMonth === m.id ? 1 : 0.7 }}>{m.title}</div>
              <div style={{ fontSize: 10, opacity: 0.6, marginTop: 1 }}>{m.subtitle.split("&")[0].trim()}</div>

      {/* TABS */}
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["plan", "📅 Plan"], ["tips", "💡 Conseils"], ["jobs", "🎯 Objectifs"]].map(([t, label]) => (
          <button key={t} onClick={() => setTab(t)} style={{
            flex: 1, padding: "9px 4px", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 12,
            background: tab === t ? month.color : "white",
            color: tab === t ? "white" : "#64748b",
            border: tab === t ? `2px solid ${month.color}` : "2px solid #e2e8f0",
            transition: "all 0.15s",
          }}>{label}</button>
        ))}
      </div>

      {tab === "plan" && (
        <>
          {/* MONTH HEADER */}
          <div style={{
            background: "white", border: `2px solid ${month.border}`,
            borderRadius: 16, padding: 18, marginBottom: 14,
            borderLeft: `5px solid ${month.color}`
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <span style={{ fontSize: 28 }}>{month.icon}</span>
              <div>
                <div style={{ fontSize: 17, fontWeight: 900, color: month.color }}>{month.title} — {month.subtitle}</div>
                <div style={{ fontSize: 12, color: "#64748b", marginTop: 3 }}>{month.goal}</div>
              </div>
            </div>
            {/* Progress bar */}
            <div style={{ marginTop: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>Progression</span>
                <span style={{ fontSize: 11, fontWeight: 800, color: month.color }}>{monthChecked}/{monthDayCount} jours · {pct}%</span>
              </div>
              <div style={{ height: 7, background: "#e2e8f0", borderRadius: 99 }}>
                <div style={{ height: "100%", width: `${pct}%`, background: month.color, borderRadius: 99, transition: "width 0.3s" }} />
              </div>
            </div>
          </div>

          {/* WEEKS */}
          {month.weeks.map((week, wi) => (
            <div key={week.id} style={{ marginBottom: 10, borderRadius: 14, overflow: "hidden", border: "1.5px solid #e2e8f0", background: "white", boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
              <button
                onClick={() => toggleWeek(week.id)}
                style={{
                  width: "100%", display: "flex", alignItems: "center",
                  justifyContent: "space-between", padding: "13px 16px",
                  background: openWeek === week.id ? month.light : "white",
                  border: "none", cursor: "pointer", textAlign: "left",
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{
                    width: 30, height: 30, borderRadius: "50%",
                    background: month.color, color: "white",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12, fontWeight: 800, flexShrink: 0
                  }}>S{week.num}</div>
                  <span style={{ fontWeight: 700, fontSize: 13, color: "#1e293b" }}>{week.title}</span>
                </div>
                <span style={{ color: month.color, fontSize: 16, marginLeft: 8 }}>
                  {openWeek === week.id ? "▲" : "▼"}
                </span>
              </button>

              {openWeek === week.id && (
                <div style={{ padding: "2px 14px 16px" }}>
                  {/* Days */}
                  <div style={{ overflowX: "auto", marginBottom: 14 }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
                      <thead>
                        <tr style={{ background: "#f8fafc" }}>
                          <th style={{ padding: "8px 10px", textAlign: "left", color: "#94a3b8", fontWeight: 600, width: 56, borderBottom: "1px solid #e2e8f0" }}>Jour</th>
                          <th style={{ padding: "8px 10px", textAlign: "left", color: "#94a3b8", fontWeight: 600, borderBottom: "1px solid #e2e8f0" }}>Ce que tu apprends</th>
                          <th style={{ padding: "8px 10px", textAlign: "left", color: "#94a3b8", fontWeight: 600, width: 140, borderBottom: "1px solid #e2e8f0" }}>Outils</th>
                        </tr>
                      </thead>
                      <tbody>
                        {week.days.map((day, di) => {
                          const iid = `${week.id}-${di}`;
                          const done = !!checked[iid];
                          return (
                            <tr key={di} style={{ borderBottom: "1px solid #f1f5f9", background: done ? "#f0fdf4" : "white", transition: "background 0.1s" }}>
                              <td style={{ padding: "9px 10px" }}>
                                <div
                                  onClick={() => toggle(iid)}
                                  style={{ display: "flex", alignItems: "center", gap: 7, cursor: "pointer" }}
                                >
                                  <div style={{
                                    width: 18, height: 18, borderRadius: 5, flexShrink: 0,
                                    background: done ? "#22c55e" : "white",
                                    border: `2px solid ${done ? "#22c55e" : "#cbd5e1"}`,
                                    display: "flex", alignItems: "center", justifyContent: "center",
                                    fontSize: 10, color: "white", fontWeight: 800,
                                    transition: "all 0.15s",
                                  }}>{done ? "✓" : ""}</div>
                                  <span style={{ fontWeight: 700, color: done ? "#22c55e" : "#475569", fontSize: 12 }}>{day.d}</span>
                                </div>
                              </td>
                              <td style={{ padding: "9px 10px", color: done ? "#9ca3af" : "#334155", textDecoration: done ? "line-through" : "none", lineHeight: 1.4 }}>
                                {day.focus}
                              </td>
                              <td style={{ padding: "9px 10px" }}>
                                {day.tools && (
                                  <span style={{
                                    fontSize: 10.5, color: month.color,
                                    background: month.light, padding: "2px 8px",
                                    borderRadius: 20, fontWeight: 600, whiteSpace: "nowrap"
                                  }}>{day.tools}</span>
                                )}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>

                  {/* Mini project */}
                  <div style={{
                    background: `linear-gradient(135deg, ${month.light} 0%, #fff 100%)`,
                    border: `1.5px solid ${month.border}`,
                    borderRadius: 12, padding: 14
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                      <span style={{ fontSize: 22 }}>{week.mini.emoji}</span>
                      <div>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px" }}>Mini-Projet Semaine</div>
                        <div style={{ fontSize: 14, fontWeight: 800, color: month.color }}>{week.mini.title}</div>
                      </div>
                    </div>
                    <p style={{ fontSize: 12.5, color: "#475569", margin: "0 0 10px", lineHeight: 1.55 }}>{week.mini.desc}</p>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                      {week.mini.tags.map(tag => (
                        <span key={tag} style={{
                          background: month.color, color: "white",
                          padding: "3px 10px", borderRadius: 20,
                          fontSize: 10.5, fontWeight: 700,
                        }}>{tag}</span>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          ))}

          {/* FULL PROJECT */}
          <div style={{
            background: "white",
            border: `2px solid ${month.color}`,
            borderRadius: 18, padding: 20, marginTop: 8,
            boxShadow: `0 4px 20px ${month.color}22`
          }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 10 }}>
              <span style={{ fontSize: 28 }}>🏆</span>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px" }}>Projet Phare — {month.title}</div>
                <div style={{ fontSize: 15, fontWeight: 900, color: month.color, lineHeight: 1.3 }}>{month.full.title}</div>
              </div>
            </div>
            <p style={{ fontSize: 13, color: "#475569", marginBottom: 14, lineHeight: 1.6 }}>{month.full.desc}</p>

            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 800, color: "#1e293b", marginBottom: 7 }}>📦 Livrables attendus:</div>
              {month.full.deliverables.map((d, i) => (
                <div key={i} style={{ display: "flex", gap: 7, fontSize: 12.5, color: "#475569", marginBottom: 5, alignItems: "flex-start" }}>
                  <span style={{ color: month.color, fontWeight: 800, flexShrink: 0 }}>→</span>
                  <span>{d}</span>
                </div>
              ))}
            </div>

            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontSize: 12, background: month.light, color: month.color, padding: "5px 12px", borderRadius: 20, fontWeight: 700 }}>
                🛠 {month.full.stack}
              </div>
              <div style={{ fontSize: 12, background: "#fef3c7", color: "#92400e", padding: "5px 12px", borderRadius: 20, fontWeight: 700 }}>
                ⏱ {month.full.duration}
              </div>
            </div>
          </div>
        </>
      )}

      {tab === "tips" && (
        <div>
          <div style={{ background: "white", borderRadius: 16, padding: 20, marginBottom: 12, border: "1.5px solid #e2e8f0" }}>
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 14, color: "#1e293b" }}>💡 Règles pour réussir ces 3 mois</div>
            {TIPS.map((t, i) => (
              <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "12px 14px", background: "#f8fafc", borderRadius: 12, marginBottom: 8 }}>
                <span style={{ fontSize: 22, flexShrink: 0 }}>{t.icon}</span>
                <span style={{ fontSize: 13.5, color: "#334155", lineHeight: 1.45, fontWeight: 500 }}>{t.text}</span>
              </div>
            ))}
          </div>

          <div style={{ background: "white", borderRadius: 16, padding: 20, marginBottom: 12, border: "1.5px solid #e2e8f0" }}>
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 14, color: "#1e293b" }}>📚 Ressources Clés</div>
            {[
              ["🎓", "Fast.ai", "Cours DL pratique et gratuit — parfait pour démarrer"],
              ["🤗", "Hugging Face Docs", "La référence pour tout ce qui est NLP et LLMs"],
              ["📄", "Papers With Code", "Les derniers papiers avec le code officiel"],
              ["🏆", "Kaggle", "Compétitions + notebooks de la communauté + datasets"],
              ["📺", "Andrej Karpathy (YouTube)", "Les meilleures vidéos sur les LLMs — Neural Nets: Zero to Hero"],
              ["💬", "Discord ML France", "Communauté francophone pour les questions"],
              ["🔧", "LangChain Docs", "Documentation officielle complète"],
              ["⚡", "FastAPI Docs", "La meilleure documentation d'un framework ever"],
            ].map(([icon, name, desc], i) => (
              <div key={i} style={{ display: "flex", gap: 10, padding: "10px 14px", background: i % 2 === 0 ? "#f8fafc" : "white", borderRadius: 10, marginBottom: 4 }}>
                <span style={{ fontSize: 20, flexShrink: 0 }}>{icon}</span>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#1e293b" }}>{name}</div>
                  <div style={{ fontSize: 12, color: "#64748b" }}>{desc}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ background: "white", borderRadius: 16, padding: 20, border: "1.5px solid #e2e8f0" }}>
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 14, color: "#1e293b" }}>🗓 Organisation Journalière Recommandée</div>
            {[
              ["☀️ Matin (2h)", "Nouveau contenu: vidéos, articles, documentation"],
              ["💻 Après-midi (2-3h)", "Coding: exercices, projet en cours, expérimentations"],
              ["📝 Soir (30-45min)", "Révision, notes Anki/Notion, push GitHub + commit message clair"],
            ].map(([time, desc], i) => (
              <div key={i} style={{ display: "flex", gap: 14, padding: "12px 14px", background: "#f8fafc", borderRadius: 12, marginBottom: 8 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: "#7c3aed", minWidth: 120, flexShrink: 0 }}>{time}</div>
                <div style={{ fontSize: 13, color: "#475569" }}>{desc}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === "jobs" && (
        <div>
          <div style={{ background: "white", borderRadius: 16, padding: 20, marginBottom: 12, border: "1.5px solid #e2e8f0" }}>
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 4, color: "#1e293b" }}>🎯 Profils Cibles après 3 mois</div>
            <div style={{ fontSize: 12, color: "#64748b", marginBottom: 16 }}>Salaires remote international (USD). Varie selon expérience et portfolio.</div>
            {JOBS.map((j, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", background: i % 2 === 0 ? "#f8fafc" : "white", borderRadius: 12, marginBottom: 8 }}>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 14, color: "#1e293b" }}>{j.title}</div>
                  <div style={{ fontSize: 12, color: "#22c55e", fontWeight: 700, marginTop: 2 }}>{j.salary}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: "#64748b", marginBottom: 3 }}>Demande marché</div>
                  <div style={{ display: "flex", gap: 2 }}>
                    {Array.from({ length: 5 }).map((_, k) => (
                      <div key={k} style={{ width: 8, height: 8, borderRadius: "50%", background: k < j.demand ? "#f59e0b" : "#e2e8f0" }} />
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ background: "white", borderRadius: 16, padding: 20, marginBottom: 12, border: "1.5px solid #e2e8f0" }}>
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 14, color: "#1e293b" }}>📋 Checklist Portfolio Final (Mois 3)</div>
            {[
              ["✅ GitHub", "3 projets phares épinglés + README pro pour chaque"],
              ["✅ HuggingFace Hub", "Modèles fine-tunés publiés + model cards"],
              ["✅ Application déployée", "Au moins 1 app live avec URL publique"],
              ["✅ LinkedIn", "Profil optimisé + 2-3 posts techniques"],
              ["✅ CV", "ATS-friendly, 1 page, projets quantifiés"],
              ["✅ Kaggle", "Au moins 1 compétition complétée, top 50%"],
              ["✅ Blog technique", "1-2 articles sur Medium ou LinkedIn"],
            ].map(([badge, text], i) => (
              <div key={i} style={{ display: "flex", gap: 10, fontSize: 13, padding: "9px 12px", background: "#f0fdf4", borderRadius: 10, marginBottom: 7, color: "#166534" }}>
                <span style={{ flexShrink: 0 }}>{badge}</span>
                <span style={{ fontWeight: 500 }}>{text}</span>
              </div>
            ))}
          </div>

          <div style={{ background: "linear-gradient(135deg, #1e1b4b, #312e81)", borderRadius: 16, padding: 20, color: "white" }}>
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 12 }}>🚀 Où chercher du travail ?</div>
            {[
              ["LinkedIn Jobs", "Filtrer: Remote, AI Engineer, ML Engineer, Junior"],
              ["Otta.com", "Spécialisé tech, excellentes offres remote"],
              ["Wellfound (AngelList)", "Startups tech — très ouvertes aux juniors avec projets"],
              ["Remote.co / WeWorkRemotely", "Jobs 100% remote en AI/ML"],
              ["Toptal / Upwork", "Freelance AI/ML pour construire expérience"],
              ["HuggingFace Jobs", "Offres spécifiques AI/NLP"],
            ].map(([platform, tip], i) => (
              <div key={i} style={{ padding: "10px 12px", background: "rgba(255,255,255,0.1)", borderRadius: 10, marginBottom: 7 }}>
                <div style={{ fontWeight: 800, fontSize: 13 }}>{platform}</div>
                <div style={{ fontSize: 12, opacity: 0.7, marginTop: 2 }}>{tip}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ textAlign: "center", padding: "20px 0 8px", fontSize: 11, color: "#94a3b8" }}>
        3 mois · 84 jours · 12 semaines · 12 mini-projets · 3 projets phares
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Roadmap />);
</script>
</body>
</html>
